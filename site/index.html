<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAT — Ressources</title>
<style>
  :root {
    --accent: #3b5fa0;
    --accent-light: #eef2fa;
    --accent-hover: #2d4a80;
    --bg: #f5f6f8;
    --card: #ffffff;
    --border: #dde2ea;
    --text: #1a202c;
    --muted: #6b7280;
    --sidebar-w: 260px;
    --radius: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }

  header { background: var(--accent); color: #fff; padding: 14px 24px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 6px rgba(0,0,0,.15); }
  header h1 { font-size: 1.1rem; font-weight: 700; }

  .layout { display: grid; grid-template-columns: var(--sidebar-w) 1fr; min-height: calc(100vh - 49px); align-items: start; }

  aside { background: var(--card); border-right: 1px solid var(--border); padding: 0; position: sticky; top: 49px; height: calc(100vh - 49px); overflow-y: auto; }

  .sidebar-search { padding: 14px 14px 10px; border-bottom: 1px solid var(--border); }
  .search-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 6px; }
  .search-wrap { position: relative; }
  .search-wrap input { width: 100%; padding: 7px 10px 7px 30px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 0.82rem; background: var(--bg); color: var(--text); outline: none; transition: border-color .15s; }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap svg { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }

  .filter-section { border-bottom: 1px solid var(--border); padding: 10px 0 6px; }
  .filter-title { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); padding: 0 14px 6px; }

  /* Lignes filtre simples */
  .filter-row { display: flex; align-items: center; padding: 6px 14px; cursor: pointer; font-size: 0.84rem; color: var(--text); transition: background .1s; user-select: none; border-left: 3px solid transparent; }
  .filter-row:hover { background: var(--accent-light); }
  .filter-row.active { background: var(--accent-light); color: var(--accent); font-weight: 600; border-left-color: var(--accent); }

  /* Arbre chapitres */
  .tree-theme { border-left: 3px solid transparent; }
  .tree-theme-header { display: flex; align-items: center; gap: 6px; padding: 7px 14px; cursor: pointer; font-size: 0.86rem; font-weight: 600; color: var(--text); transition: background .1s; user-select: none; }
  .tree-theme-header:hover { background: var(--accent-light); }
  .tree-theme-header.active { background: var(--accent-light); color: var(--accent); border-left: 3px solid var(--accent); margin-left: -3px; }
  .tree-chevron { font-size: 0.65rem; color: var(--muted); transition: transform .15s; flex-shrink: 0; }
  .tree-chevron.open { transform: rotate(90deg); }
  .tree-theme-code { font-size: 0.7rem; font-weight: 700; font-family: monospace; padding: 1px 6px; border-radius: 4px; flex-shrink: 0; }
  .theme-code-NO { background: #fde8e8; color: #AE0600; }
  .theme-code-FA { background: #fef3e0; color: #8a5a00; }
  .theme-code-ES { background: #e8f2fa; color: #1a4f72; }
  .theme-code-GM { background: #f0fae0; color: #3a6600; }
  .theme-code-RS { background: #f0eef8; color: #3a2f6e; }
  .theme-code-AU { background: #f0f0f0; color: #444444; }

  .tree-children { display: none; }
  .tree-children.open { display: block; }

  .tree-sub { display: flex; align-items: center; padding: 5px 14px 5px 28px; cursor: pointer; font-size: 0.81rem; color: var(--muted); transition: background .1s; user-select: none; border-left: 3px solid transparent; }
  .tree-sub:hover { background: var(--accent-light); color: var(--text); }
  .tree-sub::before { content: "–"; margin-right: 7px; color: var(--border); font-size: 0.75rem; }

  /* Tags */
  .tag-famille { padding: 4px 0 2px; }
  .tag-famille-label { font-size: 0.65rem; color: var(--muted); padding: 2px 14px 4px; font-style: italic; }
  .tags-wrap { padding: 4px 14px 6px; display: flex; flex-wrap: wrap; gap: 5px; }
  .tag-pill { font-size: 0.74rem; padding: 3px 9px; border-radius: 12px; background: var(--bg); border: 1px solid var(--border); color: var(--muted); cursor: pointer; transition: all .1s; }
  .tag-pill:hover { border-color: var(--accent); color: var(--accent); }
  .tag-pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .reset-wrap { padding: 10px 14px; }
  #reset-btn { display: none; width: 100%; padding: 7px; border: 1px solid var(--border); border-radius: var(--radius); background: transparent; color: var(--muted); font-size: 0.8rem; cursor: pointer; transition: all .12s; }
  #reset-btn:hover { border-color: #ef4444; color: #ef4444; }
  #reset-btn.visible { display: block; }

  main { padding: 20px 24px; }
  .results-info { font-size: 0.78rem; color: var(--muted); margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); min-height: 20px; }

  .list { display: flex; flex-direction: column; gap: 8px; }

  .row { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; display: grid; grid-template-columns: 90px 1fr auto; align-items: center; gap: 12px; transition: box-shadow .12s, border-color .12s; }
  .row:hover { box-shadow: 0 2px 8px rgba(0,0,0,.08); border-color: #c5cfe0; }

  .row-code { font-size: 0.72rem; font-weight: 700; font-family: monospace; padding: 3px 8px; border-radius: 4px; text-align: center; white-space: nowrap; }
  .theme-NO { background: #fde8e8; color: #AE0600; border-left: 3px solid #AE0600; }
  .theme-FA { background: #fef3e0; color: #8a5a00; border-left: 3px solid #E79840; }
  .theme-ES { background: #e8f2fa; color: #1a4f72; border-left: 3px solid #5698C9; }
  .theme-GM { background: #f0fae0; color: #3a6600; border-left: 3px solid #8CCB30; }
  .theme-RS { background: #f0eef8; color: #3a2f6e; border-left: 3px solid #6C61A2; }
  .theme-AU { background: #f0f0f0; color: #444444; border-left: 3px solid #888888; }

  .row-body { min-width: 0; }
  .row-titre { font-weight: 600; font-size: 0.95rem; color: var(--text); margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
  .row-titre-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .type-badge { font-size: 0.65rem; font-weight: 700; font-family: monospace; padding: 2px 6px; border-radius: 3px; white-space: nowrap; flex-shrink: 0; background: var(--accent-light); color: var(--accent); }
  .row-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--muted); }
  .meta-sep { color: var(--border); }
  .row-tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .row-tag { font-size: 0.7rem; color: var(--accent); background: var(--accent-light); padding: 1px 6px; border-radius: 8px; }

  .diff { display: inline-flex; gap: 3px; align-items: center; }
  .diff-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); }
  .diff-dot.on { background: var(--accent); }

  .row-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .btn { padding: 6px 12px; border-radius: var(--radius); font-size: 0.78rem; font-weight: 500; cursor: pointer; border: 1px solid var(--border); white-space: nowrap; transition: all .1s; background: var(--card); color: var(--text); }
  .btn-eleve { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-eleve:hover { background: var(--accent-hover); }
  .btn-corrige:hover { background: var(--bg); }
  .btn.disabled { opacity: 0.35; pointer-events: none; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(15,20,40,.55); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--card); border-radius: 10px; width: 92vw; max-width: 920px; height: 92vh; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 24px 64px rgba(0,0,0,.3); }
  .modal-bar { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; background: var(--bg); }
  .modal-title { font-weight: 600; flex: 1; font-size: 0.88rem; }
  .modal-dl { font-size: 0.78rem; color: var(--accent); text-decoration: none; padding: 4px 10px; border: 1px solid var(--accent); border-radius: var(--radius); }
  .modal-dl:hover { background: var(--accent-light); }
  .modal-close { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 1.1rem; padding: 4px 8px; border-radius: 4px; }
  .modal-close:hover { background: var(--border); }
  .modal iframe { flex: 1; border: none; width: 100%; }

  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty p { font-size: 0.88rem; margin-top: 10px; }
</style>
</head>
<body>

<header>
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
  <h1>MAT — Ressources mathématiques</h1>
</header>

<div class="layout">
  <aside>
    <div class="sidebar-search">
      <div class="search-label">Recherche</div>
      <div class="search-wrap">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search" placeholder="Ex: probabilité, jeu…" autocomplete="off">
      </div>
    </div>

    <!-- Arbre chapitres -->
    <div class="filter-section">
      <div class="filter-title">Chapitre</div>
      <div id="tree-chapitres"></div>
    </div>

    <div class="filter-section">
      <div class="filter-title">Type</div>
      <div id="filter-type"></div>
    </div>

    <div class="filter-section">
      <div class="filter-title">Catégorie</div>
      <div id="filter-categorie"></div>
    </div>

    <div class="filter-section">
      <div class="filter-title">Niveau</div>
      <div id="filter-niveau"></div>
    </div>

    <div class="filter-section">
      <div class="filter-title">Difficulté</div>
      <div id="filter-difficulte"></div>
    </div>

    <div class="filter-section" id="section-tags">
      <div class="filter-title">Tags</div>
      <div id="filter-tags-contenu" class="tag-famille">
        <div class="tag-famille-label">Contenu</div>
        <div class="tags-wrap" id="tags-c"></div>
      </div>
      <div id="filter-tags-format" class="tag-famille">
        <div class="tag-famille-label">Format</div>
        <div class="tags-wrap" id="tags-f"></div>
      </div>
      <div id="filter-tags-outil" class="tag-famille">
        <div class="tag-famille-label">Outil</div>
        <div class="tags-wrap" id="tags-o"></div>
      </div>
      <div id="filter-tags-pedagogie" class="tag-famille">
        <div class="tag-famille-label">Pédagogie</div>
        <div class="tags-wrap" id="tags-p"></div>
      </div>
    </div>

    <div class="reset-wrap">
      <button id="reset-btn" onclick="resetFilters()">✕ Réinitialiser</button>
    </div>
  </aside>

  <main>
    <div class="results-info" id="results-info"></div>
    <div class="list" id="list"></div>
    <div class="empty" id="empty" style="display:none">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:#cbd5e1"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <p>Aucune ressource ne correspond à ces filtres.</p>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modal" onclick="closeModalBg(event)">
  <div class="modal">
    <div class="modal-bar">
      <span class="modal-title" id="modal-title"></span>
      <a id="modal-dl" href="#" download class="modal-dl">⬇ Télécharger</a>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <iframe id="modal-frame" src=""></iframe>
  </div>
</div>

<script>
let ALL = [];

// Ordre et noms officiels des thèmes
const THEME_COLORS = {
  NO: { bg: "#fde8e8", border: "#AE0600", text: "#AE0600" },
  FA: { bg: "#fef3e0", border: "#E79840", text: "#8a5a00" },
  ES: { bg: "#e8f2fa", border: "#5698C9", text: "#1a4f72" },
  GM: { bg: "#f0fae0", border: "#8CCB30", text: "#3a6600" },
  RS: { bg: "#f0eef8", border: "#6C61A2", text: "#3a2f6e" },
  AU: { bg: "#f0f0f0", border: "#888888", text: "#444444" },
};

const THEMES = [
  { code: "NO", label: "Nombres & Opérations" },
  { code: "FA", label: "Fonctions & Algèbre"  },
  { code: "ES", label: "Espace"               },
  { code: "GM", label: "Grandeurs & Mesures"  },
  { code: "RS", label: "Recherche & Stratégies"},
  { code: "AU", label: "Autre"                },
];

const SOUS_CHAPITRES_ORDER = {
  NO: ["NombresNaturelsDecimaux","NombresRelatifs","NombresRationnels","NombresReels","SituationsAleatoires"],
  FA: ["Proportionnalite","Fonctions","Diagrammes","CalculLitteral","Equations"],
  ES: ["FiguresGeometriquesPlanes","RepresentationSolides","TransformationsGeometriques"],
  GM: ["LignesSurfaces","Theoremes","Solides","DiversMesures"],
  RS: [],
  AU: [],
};

function sortSubs(theme, subs) {
  const ordre = SOUS_CHAPITRES_ORDER[theme] || [];
  return [...subs].sort((a, b) => {
    const ia = ordre.indexOf(a), ib = ordre.indexOf(b);
    if (ia === -1 && ib === -1) return a.localeCompare(b, "fr");
    if (ia === -1) return 1;
    if (ib === -1) return -1;
    return ia - ib;
  });
}

let active = {
  theme:        null,
  sous_chapitre: null,
  type:         null,
  categorie:    null,
  niveau:       null,
  difficulte:   null,
  tags:         new Set(),
};
let searchQuery = "";

const DIFF_LABELS = { 1: "● Facile", 2: "●● Moyen", 3: "●●● Difficile" };

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  try { const r = await fetch("ressources.json"); ALL = await r.json(); }
  catch { ALL = []; }
  buildSidebar();
  render();
}

// ── Sidebar ───────────────────────────────────────────────────────────────────
function buildSidebar() {
  buildTree();
  buildRows("filter-type",       uniq(ALL.map(r => r.type)),                           "type");
  buildRows("filter-categorie",  uniq(ALL.map(r => r.categorie).filter(Boolean)),      "categorie");
  buildRows("filter-niveau",     uniq(ALL.flatMap(r => r.niveau||[])),                 "niveau");
  buildRows("filter-difficulte", uniq(ALL.map(r => r.difficulte).filter(Boolean)).sort(), "difficulte", DIFF_LABELS);
  buildTagsFamilles();
}

function buildTree() {
  const container = document.getElementById("tree-chapitres");
  container.innerHTML = "";

  // Recense les sous-chapitres par thème
  const subsByTheme = {};
  ALL.forEach(r => {
    const t = r.theme || "AU";
    if (!subsByTheme[t]) subsByTheme[t] = new Set();
    if (r.sous_chapitre) subsByTheme[t].add(r.sous_chapitre);
  });

  THEMES.forEach(({ code, label }) => {
    if (!subsByTheme[code] && !ALL.some(r => (r.theme||"AU") === code)) return;

    const subs = sortSubs(code, [...(subsByTheme[code] || [])]);

    const themeEl = document.createElement("div");
    themeEl.className = "tree-theme";
    themeEl.id = `theme-${code}`;

    const header = document.createElement("div");
    header.className = "tree-theme-header";
    header.innerHTML = `
      <span class="tree-chevron" id="chev-${code}">▶</span>
      <span class="tree-theme-code theme-code-${code}">${code}</span>
      <span style="flex:1">${label}</span>
    `;
    header.onclick = () => toggleTheme(code, header);
    themeEl.appendChild(header);

    const children = document.createElement("div");
    children.className = "tree-children";
    children.id = `children-${code}`;

    subs.forEach(sub => {
      const row = document.createElement("div");
      row.className = "tree-sub";
      row.dataset.theme = code;
      row.dataset.sub   = sub;
      row.textContent   = sub;
      row.onclick = (e) => { e.stopPropagation(); toggleSub(code, sub, row); };
      children.appendChild(row);
    });

    themeEl.appendChild(children);
    container.appendChild(themeEl);
  });
}

function toggleTheme(code, header) {
  const chev     = document.getElementById(`chev-${code}`);
  const children = document.getElementById(`children-${code}`);
  const isOpen   = children.classList.contains("open");

  // Si on clique sur le thème déjà actif → désactive
  if (active.theme === code && active.sous_chapitre === null) {
    active.theme = null;
    header.classList.remove("active");
    header.style.background = header.style.color = header.style.borderLeft = header.style.marginLeft = "";
    children.classList.remove("open");
    chev.classList.remove("open");
    updateReset(); render(); return;
  }

  // Désactive tout autre thème
  document.querySelectorAll(".tree-theme-header.active").forEach(h => {
    h.classList.remove("active");
    h.style.background = h.style.color = h.style.borderLeft = h.style.marginLeft = "";
  });
  document.querySelectorAll(".tree-sub.active").forEach(s => s.classList.remove("active"));
  document.querySelectorAll(".tree-children.open").forEach(c => { c.classList.remove("open"); });
  document.querySelectorAll(".tree-chevron.open").forEach(c => c.classList.remove("open"));

  active.theme         = code;
  active.sous_chapitre = null;
  header.classList.add("active");
  const c = THEME_COLORS[code] || THEME_COLORS.AU;
  header.style.background   = c.bg;
  header.style.color        = c.text;
  header.style.borderLeft   = `3px solid ${c.border}`;
  header.style.marginLeft   = "-3px";
  children.classList.add("open");
  chev.classList.add("open");
  updateReset(); render();
}

function toggleSub(code, sub, row) {
  // Si déjà actif → désactive le sous-chapitre (garde le thème)
  if (active.sous_chapitre === sub && active.theme === code) {
    active.sous_chapitre = null;
    row.classList.remove("active");
    updateReset(); render(); return;
  }

  // Active le thème parent si pas déjà ouvert
  const header   = document.querySelector(`#theme-${code} .tree-theme-header`);
  const children = document.getElementById(`children-${code}`);
  const chev     = document.getElementById(`chev-${code}`);
  document.querySelectorAll(".tree-theme-header.active").forEach(h => {
    h.classList.remove("active");
    h.style.background = h.style.color = h.style.borderLeft = h.style.marginLeft = "";
  });
  document.querySelectorAll(".tree-sub.active").forEach(s => {
    s.classList.remove("active");
    s.style.background = s.style.color = s.style.borderLeft = s.style.fontWeight = "";
  });
  document.querySelectorAll(".tree-children.open").forEach(c => c.classList.remove("open"));
  document.querySelectorAll(".tree-chevron.open").forEach(c => c.classList.remove("open"));

  active.theme         = code;
  active.sous_chapitre = sub;
  header.classList.add("active");
  const c = THEME_COLORS[code] || THEME_COLORS.AU;
  header.style.background = c.bg;
  header.style.color      = c.text;
  header.style.borderLeft = `3px solid ${c.border}`;
  header.style.marginLeft = "-3px";
  children.classList.add("open");
  chev.classList.add("open");
  row.classList.add("active");
  row.style.background  = c.bg;
  row.style.color       = c.text;
  row.style.borderLeft  = `3px solid ${c.border}`;
  row.style.fontWeight  = "500";
  updateReset(); render();
}

function buildRows(containerId, items, key, labels) {
  const el = document.getElementById(containerId);
  el.innerHTML = "";
  items.forEach(item => {
    const row = document.createElement("div");
    row.className = "filter-row";
    row.dataset.key = key;
    row.dataset.val = item;
    const label = labels ? (labels[item] || item) : item;
    row.innerHTML = `<span>${escHtml(String(label))}</span>`;
    row.onclick = () => toggleRow(key, item, row);
    el.appendChild(row);
  });
}

const TAG_PREFIXES = { c: "Contenu", f: "Format", o: "Outil", p: "Pédagogie" };
const TAG_IDS      = { c: "tags-c", f: "tags-f", o: "tags-o", p: "tags-p" };

function tagLabel(tag) {
  // Retire le préfixe pour l'affichage : "c-fractions" → "fractions"
  return tag.replace(/^[cfop]-/, "");
}

function buildTagsFamilles() {
  // Regroupe les tags par famille
  const familles = { c: new Set(), f: new Set(), o: new Set(), p: new Set() };
  ALL.forEach(r => (r.tags||[]).forEach(t => {
    const prefix = t.match(/^([cfop])-/)?.[1];
    if (prefix) familles[prefix].add(t);
  }));

  Object.entries(familles).forEach(([prefix, tags]) => {
    const el = document.getElementById(TAG_IDS[prefix]);
    const section = el?.closest(".tag-famille");
    if (!el) return;
    el.innerHTML = "";
    if (tags.size === 0) { if (section) section.style.display = "none"; return; }
    if (section) section.style.display = "";
    [...tags].sort((a,b) => tagLabel(a).localeCompare(tagLabel(b), "fr")).forEach(tag => {
      const pill = document.createElement("span");
      pill.className = "tag-pill";
      pill.textContent = tagLabel(tag);
      pill.dataset.tag = tag;
      pill.onclick = () => toggleTag(tag, pill);
      el.appendChild(pill);
    });
  });
}

function toggleRow(key, val, row) {
  if (active[key] == val) {
    active[key] = null;
    row.classList.remove("active");
  } else {
    document.querySelectorAll(`.filter-row[data-key="${key}"].active`).forEach(r => r.classList.remove("active"));
    active[key] = val;
    row.classList.add("active");
  }
  updateReset(); render();
}

function toggleTag(tag, pill) {
  if (active.tags.has(tag)) { active.tags.delete(tag); pill.classList.remove("active"); }
  else                       { active.tags.add(tag);    pill.classList.add("active");    }
  updateReset(); render();
}

function resetFilters() {
  active = { theme: null, sous_chapitre: null, type: null, categorie: null, niveau: null, difficulte: null, tags: new Set() };
  document.querySelectorAll(".filter-row.active, .tag-pill.active, .tree-theme-header.active, .tree-sub.active").forEach(el => {
    el.classList.remove("active");
    el.style.background = el.style.color = el.style.borderLeft = el.style.marginLeft = el.style.fontWeight = "";
  });
  document.querySelectorAll(".tree-children.open").forEach(c => c.classList.remove("open"));
  document.querySelectorAll(".tree-chevron.open").forEach(c => c.classList.remove("open"));
  document.getElementById("search").value = "";
  searchQuery = "";
  updateReset(); render();
}

function updateReset() {
  const has = active.theme || active.sous_chapitre || active.type || active.categorie || active.niveau || active.difficulte || active.tags.size > 0 || searchQuery;
  document.getElementById("reset-btn").classList.toggle("visible", !!has);
}

// ── Filtrage ──────────────────────────────────────────────────────────────────
function matches(r) {
  const theme = r.theme || "AU";
  if (active.sous_chapitre && r.sous_chapitre !== active.sous_chapitre)              return false;
  if (!active.sous_chapitre && active.theme && theme !== active.theme)               return false;
  if (active.type       && r.type !== active.type)                                   return false;
  if (active.categorie  && r.categorie !== active.categorie)                         return false;
  if (active.niveau     && !(r.niveau||[]).includes(active.niveau))                  return false;
  if (active.difficulte && r.difficulte != active.difficulte)                        return false;
  if (active.tags.size  && ![...active.tags].every(t => (r.tags||[]).includes(t)))  return false;
  if (searchQuery) {
    const q   = searchQuery.toLowerCase();
    const hay = [r.titre, r.chapitre, r.sous_chapitre, r.theme, r.type,
                 ...(r.tags||[]), ...(r.niveau||[])].join(" ").toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

// ── Rendu ─────────────────────────────────────────────────────────────────────
function render() {
  const filtered = ALL.filter(matches);
  const list  = document.getElementById("list");
  const empty = document.getElementById("empty");
  const info  = document.getElementById("results-info");

  list.innerHTML = "";

  if (filtered.length === 0) {
    empty.style.display = "block";
    info.textContent = "";
    return;
  }
  empty.style.display = "none";
  info.textContent = `${filtered.length} ressource${filtered.length > 1 ? "s" : ""}`;

  filtered.forEach(r => {
    const row  = document.createElement("div");
    row.className = "row";

    const btnE = (r.pdf && r.type !== "RES")
      ? `<button class="btn btn-eleve"   onclick="openPDF('${r.pdf}','${escHtml(r.titre)}')">Exercice</button>`
      : "";
    const btnR = (r.pdf && r.type === "RES")
      ? `<button class="btn btn-eleve"   onclick="openPDF('${r.pdf}','${escHtml(r.titre)}')">Ressource</button>`
      : "";
    const btnC = (r.corrige_pdf && r.type !== "RES")
      ? `<button class="btn btn-corrige" onclick="openPDF('${r.corrige_pdf}','${escHtml(r.titre)} — corrigé')">Corrigé</button>`
      : "";
    const btnL = (r.lien && r.type === "RES" && !r.pdf)
      ? `<a class="btn btn-corrige" href="${escHtml(r.lien)}" target="_blank">↗ Ouvrir</a>`
      : "";

    const niveaux  = (r.niveau||[]).join(", ");
    const tags     = (r.tags||[]).map(t => `<span class="row-tag">#${t.replace(/^[cfop]-/, "")}</span>`).join("");
    const diff     = [1,2,3].map(i => `<span class="diff-dot${i<=(r.difficulte||1)?" on":""}"></span>`).join("");
    const categorie = r.categorie ? `<span class="meta-sep">·</span><span>${escHtml(r.categorie)}</span>` : "";

    row.innerHTML = `
      <span class="row-code theme-${escHtml(r.theme||'AU')}">${escHtml(r.type)}</span>
      <div class="row-body">
        <div class="row-titre">
          <span class="row-titre-text">${escHtml(r.titre)}</span>
        </div>
        <div class="row-meta">
          ${r.sous_chapitre ? `<span>${escHtml(r.sous_chapitre)}</span><span class="meta-sep">·</span>` : ""}
          ${niveaux         ? `<span>${niveaux}</span><span class="meta-sep">·</span>` : ""}
          ${r.type !== "RES" ? `<span class="diff">${diff}</span>` : ""}
          ${categorie}
          ${tags ? `<span class="meta-sep">·</span><span class="row-tags">${tags}</span>` : ""}
        </div>
      </div>
      <div class="row-actions">${btnE}${btnR}${btnC}${btnL}</div>
    `;
    list.appendChild(row);
  });
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openPDF(path, title) {
  document.getElementById("modal-frame").src  = path;
  document.getElementById("modal-title").textContent = title;
  document.getElementById("modal-dl").href    = path;
  document.getElementById("modal").classList.add("open");
}
function closeModalBg(e) { if (e.target===document.getElementById("modal")) closeModal(); }
function closeModal() {
  document.getElementById("modal").classList.remove("open");
  document.getElementById("modal-frame").src = "";
}
document.addEventListener("keydown", e => { if (e.key==="Escape") closeModal(); });
document.getElementById("search").addEventListener("input", e => {
  searchQuery = e.target.value.trim();
  updateReset(); render();
});

// ── Helpers ───────────────────────────────────────────────────────────────────
function uniq(arr) { return [...new Set(arr)].sort((a,b)=>String(a).localeCompare(String(b),"fr")); }
function escHtml(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

init();
</script>
</body>
</html>
